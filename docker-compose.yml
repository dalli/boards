# Shared compose for dev/staging/prod (deployment.md): same file + per-env .env override.
# Secrets are NEVER committed in .env; prod injects them at runtime (§4, deployment.md).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-boards}
      # SECRET — no default; must be injected (SEC-002, §4). Missing → empty → startup fails.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-boards}
    ports:
      # Host-side port is overridable to avoid clashing with a host Postgres; the container
      # always listens on 5432 internally (other services connect via the service name).
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-boards}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      # SECRETS — no defaults; must be injected (SEC-002, §4).
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY must be set}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-boards}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-boards}
      S3_ENDPOINT_URL: http://minio:9000
      # SECRETS — no defaults; must be injected (SEC-002, §4).
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY must be set}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"

volumes:
  pgdata:
  miniodata:
